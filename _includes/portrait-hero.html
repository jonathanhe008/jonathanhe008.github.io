<figure class="hero__portrait">
  <img src="{{ '/assets/id.png' | relative_url }}"
       alt="Jonathan He"
       width="160" height="200"
       loading="eager" fetchpriority="high"
       onerror="this.parentNode.classList.add('is-fallback')">
  <span class="hero__portrait-fallback" aria-hidden="true">JH</span>
  <span class="hero__scan-line" aria-hidden="true"></span>
</figure>
