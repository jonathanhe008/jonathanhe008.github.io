description: Software engineer, identity and agentic security.
url: https://hejonathan.com
author:
  name: Jonathan He
  email: jonathanhe008@gmail.com

# Custom layouts ship in this repo; no external theme.

# Blog engagement API (upvotes + comments). Set to the Lambda Function URL
# after deploying backend/ (see backend/README.md). Leave blank/commented to
# fall back to the local-only prototype — the site works either way.
# engagement_api: https://xxxx.lambda-url.us-east-1.on.aws

markdown: kramdown
kramdown:
  input: GFM
  smart_quotes: [lsquo, rsquo, ldquo, rdquo]
  typographic_symbols:
    hellip: "…"
    ndash: "–"
    mdash: "—"

permalink: /writing/:slug/

# Post defaults — every post gets the "post" layout unless it overrides in its own front matter.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

sass:
  style: compressed
  sass_dir: _sass

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - backend
