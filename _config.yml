title: Jonathan He
description: Software engineer, identity and agentic security.
url: https://hejonathan.com
author:
  name: Jonathan He
  email: jonathanhe008@gmail.com

# Custom layouts ship in this repo; no external theme.

# Comments — giscus (GitHub Discussions). Fill in after enabling Discussions on
# the repo and installing the giscus app; see _includes/giscus.html for the
# runbook. Until `repo_id` and `category_id` are set, the post page shows a
# small "comments coming soon" note instead of the widget.
giscus:
  repo: "jonathanhe008/jonathanhe008.github.io"
  repo_id: ""            # from https://giscus.app after selecting the repo
  category: "Announcements"
  category_id: ""        # from https://giscus.app
  mapping: "pathname"    # one discussion per post URL path
  reactions_enabled: "1" # 👍 reaction bar doubles as the upvote
  theme_url: "/assets/css/giscus.css"  # custom navy/gold theme, served from this site

markdown: kramdown
kramdown:
  input: GFM
  smart_quotes: [lsquo, rsquo, ldquo, rdquo]
  typographic_symbols:
    hellip: "…"
    ndash: "–"
    mdash: "—"

permalink: /writing/:slug/

# Post defaults — every post gets the "post" layout unless it overrides in its own front matter.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

sass:
  style: compressed
  sass_dir: _sass

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
