---
layout: default
---

{%- assign _words = content | number_of_words -%}
{%- assign _rt = _words | plus: 219 | divided_by: 220 -%}

<article class="post">
  <div class="post__meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: '%B %-d, %Y' }}</time>
    <span>{{ _rt }} min read</span>
  </div>

  <h1 class="post__title">{{ page.title }}</h1>
  <hr class="post__short-rule">

  <div class="post__body">
    {{ content }}
  </div>

</article>

<section class="post__engage" aria-label="Reactions and comments">
  <h3 class="post__comments-title">Comments &amp; reactions</h3>
  {%- include giscus.html -%}
</section>

<div class="post">
  <a class="post__back" href="{{ '/writing/' | relative_url }}">← All writing</a>
</div>
