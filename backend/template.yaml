AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Blog engagement API for hejonathan.com — anonymous upvotes + comments.
  Single Lambda behind a Function URL, one on-demand DynamoDB table.

Parameters:
  AllowedOrigin:
    Type: String
    Default: https://hejonathan.com
    Description: Primary site origin (CORS). Extra origins are allowlisted in code.

Globals:
  Function:
    Runtime: nodejs20.x
    MemorySize: 128
    Timeout: 10
    Architectures: [arm64]

Resources:
  EngagementTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: hejonathan-blog-engagement
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  EngagementFn:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: hejonathan-blog-engagement
      Handler: index.handler
      CodeUri: src/
      Environment:
        Variables:
          TABLE_NAME: !Ref EngagementTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref EngagementTable
      FunctionUrlConfig:
        AuthType: NONE
        Cors:
          AllowOrigins:
            - https://hejonathan.com
            - https://www.hejonathan.com
            - http://localhost:4000
            - http://127.0.0.1:4000
          AllowMethods: [GET, POST, OPTIONS]
          AllowHeaders: [content-type]
          MaxAge: 86400

Outputs:
  ApiUrl:
    Description: Function URL — put this in _config.yml as engagement_api.
    Value: !GetAtt EngagementFnUrl.FunctionUrl
  TableName:
    Value: !Ref EngagementTable
